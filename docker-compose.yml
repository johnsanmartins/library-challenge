services:

  postgres:
    image: postgres:16-alpine
    container_name: library-postgres
    environment:
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_pass
      POSTGRES_MULTIPLE_DATABASES: library,keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: library-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: library_user
      KC_DB_PASSWORD: library_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_URL: http://localhost:8180
      KC_HOSTNAME_ADMIN_URL: http://localhost:8180
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-library.json:/opt/keycloak/data/import/realm-library.json
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080' 2>/dev/null && exit 0 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ./biblioteca-backend
      dockerfile: Dockerfile
    container_name: library-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/library
      SPRING_DATASOURCE_USERNAME: library_user
      SPRING_DATASOURCE_PASSWORD: library_pass
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/library
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/library/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: library
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      SERVER_PORT: "8080"
      LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./biblioteca-frontend
      dockerfile: Dockerfile
    container_name: library-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      KEYCLOAK_ISSUER: http://localhost:8180/realms/library

volumes:
  postgres_data:
