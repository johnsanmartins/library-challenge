<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened class="sidenav">

    <div class="sidenav-brand">
      <div class="brand-icon">
        <mat-icon>menu_book</mat-icon>
      </div>
      <div class="brand-text">
        <span class="brand-title">Biblioteca</span>
        <span class="brand-subtitle">Sistema de Gestión</span>
      </div>
    </div>

    <nav class="sidenav-nav">
      <p class="nav-section-label">MÓDULOS</p>
      <a routerLink="/books" routerLinkActive="active-link" class="nav-item">
        <mat-icon class="nav-icon">book</mat-icon>
        <span class="nav-label">Libros</span>
      </a>
      <a routerLink="/authors" routerLinkActive="active-link" class="nav-item">
        <mat-icon class="nav-icon">person</mat-icon>
        <span class="nav-label">Autores</span>
      </a>
      <a routerLink="/clients" routerLinkActive="active-link" class="nav-item">
        <mat-icon class="nav-icon">people</mat-icon>
        <span class="nav-label">Clientes</span>
      </a>
      <a routerLink="/loans" routerLinkActive="active-link" class="nav-item">
        <mat-icon class="nav-icon">swap_horiz</mat-icon>
        <span class="nav-label">Préstamos</span>
      </a>
    </nav>

    <div class="sidenav-footer">
      <ng-container *ngIf="authService.isLoggedIn$ | async; else loginBtn">
        <div class="user-card" *ngIf="authService.userProfile$ | async as profile">
          <div class="user-avatar">
            <mat-icon>account_circle</mat-icon>
          </div>
          <div class="user-details">
            <span class="user-name">{{ profile['name'] || profile['preferred_username'] }}</span>
            <span class="user-role">Administrador</span>
          </div>
        </div>
        <button mat-button class="logout-btn" (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </ng-container>
      <ng-template #loginBtn>
        <button mat-raised-button color="primary" (click)="login()" class="login-btn">
          <mat-icon>login</mat-icon> Iniciar sesión
        </button>
      </ng-template>
    </div>

  </mat-sidenav>

  <mat-sidenav-content>
    <div class="content">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
