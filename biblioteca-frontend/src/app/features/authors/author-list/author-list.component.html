<div class="page-container">
  <div class="page-header">
    <h1>Autores</h1>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon> Agregar Autor
    </button>
  </div>

  <mat-form-field class="search-bar" appearance="outline">
    <mat-label>Buscar autores</mat-label>
    <input matInput [(ngModel)]="searchTerm" (ngModelChange)="onSearch($event)" placeholder="Nombre o nacionalidad...">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-container" *ngIf="!loading(); else spinner">
    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)">

      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let a">{{ a.firstName }}</td>
      </ng-container>

      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellido</th>
        <td mat-cell *matCellDef="let a">{{ a.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="nationality">
        <th mat-header-cell *matHeaderCellDef>Nacionalidad</th>
        <td mat-cell *matCellDef="let a">{{ a.nationality || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="birthDate">
        <th mat-header-cell *matHeaderCellDef>Fecha de nacimiento</th>
        <td mat-cell *matCellDef="let a">{{ a.birthDate ? (a.birthDate | date:'mediumDate') : '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let a">
          <button mat-icon-button color="primary" (click)="openEditDialog(a)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="openDeleteDialog(a)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="no-data-row" [attr.colspan]="displayedColumns.length">No se encontraron autores</td>
      </tr>
    </table>

    <mat-paginator [length]="totalElements()" [pageSize]="pageSize"
      [pageSizeOptions]="[5,10,25]" (page)="onPageChange($event)" showFirstLastButtons>
    </mat-paginator>
  </div>

  <ng-template #spinner>
    <div style="display:flex;justify-content:center;padding:40px">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
  </ng-template>
</div>
