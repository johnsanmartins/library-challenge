<div class="page-container">
  <div class="page-header">
    <h1>Clientes</h1>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon> Agregar Cliente
    </button>
  </div>

  <mat-form-field class="search-bar" appearance="outline">
    <mat-label>Buscar clientes</mat-label>
    <input matInput [(ngModel)]="searchTerm" (ngModelChange)="onSearch($event)" placeholder="Nombre o correo...">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-container" *ngIf="!loading(); else spinner">
    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)">

      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let c">{{ c.firstName }}</td>
      </ng-container>

      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellido</th>
        <td mat-cell *matCellDef="let c">{{ c.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Correo electrónico</th>
        <td mat-cell *matCellDef="let c">{{ c.email }}</td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let c">{{ c.phone || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="registrationDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Registrado</th>
        <td mat-cell *matCellDef="let c">{{ c.registrationDate | date:'mediumDate' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button color="primary" (click)="openEditDialog(c)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="openDeleteDialog(c)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="no-data-row" [attr.colspan]="displayedColumns.length">No se encontraron clientes</td>
      </tr>
    </table>

    <mat-paginator [length]="totalElements()" [pageSize]="pageSize"
      [pageSizeOptions]="[5,10,25,50]" (page)="onPageChange($event)" showFirstLastButtons>
    </mat-paginator>
  </div>

  <ng-template #spinner>
    <div class="spinner-wrapper">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
  </ng-template>
</div>
