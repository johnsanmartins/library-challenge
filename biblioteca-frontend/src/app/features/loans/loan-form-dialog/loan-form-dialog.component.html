<h2 mat-dialog-title>Nuevo Préstamo</h2>

<mat-dialog-content>
  <form [formGroup]="form" style="display:flex;flex-direction:column;gap:4px;padding-top:8px">

    <mat-form-field appearance="outline">
      <mat-label>Libro *</mat-label>
      <mat-select formControlName="bookId">
        <mat-option *ngFor="let book of books" [value]="book.id">
          {{ book.title }} ({{ book.availableCopies }} disponibles)
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('bookId')?.hasError('required')">Requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Cliente *</mat-label>
      <mat-select formControlName="clientId">
        <mat-option *ngFor="let client of clients" [value]="client.id">
          {{ client.firstName }} {{ client.lastName }} — {{ client.email }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('clientId')?.hasError('required')">Requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Fecha de vencimiento *</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="dueDate"
             [min]="minDate" readonly>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
      <mat-hint>Seleccione usando el calendario</mat-hint>
      <mat-error *ngIf="form.get('dueDate')?.hasError('required')">Requerido</mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid || saving">
    {{ saving ? 'Creando...' : 'Crear Préstamo' }}
  </button>
</mat-dialog-actions>
