<div class="page-container">
  <div class="page-header">
    <h1>Libros</h1>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon> Agregar Libro
    </button>
  </div>

  <mat-form-field class="search-bar" appearance="outline">
    <mat-label>Buscar libros</mat-label>
    <input matInput [(ngModel)]="searchTerm" (ngModelChange)="onSearch($event)" placeholder="Título o ISBN...">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-container" *ngIf="!loading(); else spinner">
    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)">

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Título</th>
        <td mat-cell *matCellDef="let book">{{ book.title }}</td>
      </ng-container>

      <ng-container matColumnDef="isbn">
        <th mat-header-cell *matHeaderCellDef>ISBN</th>
        <td mat-cell *matCellDef="let book">{{ book.isbn || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="publishedYear">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Año</th>
        <td mat-cell *matCellDef="let book">{{ book.publishedYear || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Categoría</th>
        <td mat-cell *matCellDef="let book">
          <mat-chip *ngIf="book.category">{{ book.category.name }}</mat-chip>
          <span *ngIf="!book.category">—</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="authors">
        <th mat-header-cell *matHeaderCellDef>Autores</th>
        <td mat-cell *matCellDef="let book">{{ getAuthorNames(book) }}</td>
      </ng-container>

      <ng-container matColumnDef="availableCopies">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Copias</th>
        <td mat-cell *matCellDef="let book">
          <span [style.color]="book.availableCopies === 0 ? '#c62828' : 'inherit'">
            {{ book.availableCopies }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let book">
          <button mat-icon-button color="primary" (click)="openEditDialog(book)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="openDeleteDialog(book)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="no-data-row" [attr.colspan]="displayedColumns.length">No se encontraron libros</td>
      </tr>
    </table>

    <mat-paginator
      [length]="totalElements()"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 25, 50]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>

  <ng-template #spinner>
    <div class="spinner-wrapper">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
  </ng-template>
</div>
